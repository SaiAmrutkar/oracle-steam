<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oracle Steam Overlay</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --steam-dark: #1b2838;
            --steam-darker: #171a21;
            --steam-blue: #1a9fff;
            --steam-light-blue: #66c0f4;
            --steam-green: #5c7e10;
            --steam-text: #c7d5e0;
            --steam-text-dim: #8f98a0;
            --glass-bg: rgba(27, 40, 56, 0.95);
            --glass-border: rgba(199, 213, 224, 0.1);
        }

        body {
            font-family: "Motiva Sans", Arial, sans-serif;
            background: transparent;
            color: var(--steam-text);
            overflow: hidden;
            user-select: none;
        }

        #overlay-root {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 999999;
        }

        .overlay-active {
            pointer-events: all !important;
        }

        /* PAUSE SCREEN BACKDROP */
        #pause-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            display: none;
            animation: fadeIn 0.2s;
        }

        #pause-backdrop.active {
            display: block;
        }

        /* MAIN OVERLAY BAR */
        #overlay-bar {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 4px;
            padding: 12px 20px;
            display: none;
            gap: 8px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.8);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #overlay-bar.active {
            display: flex;
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .overlay-icon {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 3px;
            transition: background 0.15s;
            position: relative;
        }

        .overlay-icon:hover {
            background: rgba(102, 192, 244, 0.2);
        }

        .overlay-icon.active {
            background: var(--steam-blue);
        }

        .overlay-icon svg {
            width: 24px;
            height: 24px;
            fill: var(--steam-text);
        }

        .icon-badge {
            position: absolute;
            top: 4px;
            right: 4px;
            background: #d32f2f;
            color: white;
            font-size: 10px;
            font-weight: bold;
            border-radius: 10px;
            padding: 2px 5px;
            min-width: 16px;
            text-align: center;
        }

        /* DRAGGABLE PANELS */
        .panel {
            position: fixed;
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 4px;
            box-shadow: 0 16px 64px rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            overflow: hidden;
        }

        .panel.active {
            display: flex;
        }

        .panel-header {
            background: rgba(0, 0, 0, 0.3);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: move;
            border-bottom: 1px solid var(--glass-border);
        }

        .panel-title {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .panel-close {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 3px;
            transition: background 0.15s;
        }

        .panel-close:hover {
            background: #c23030;
        }

        .panel-content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
        }

        /* FRIENDS LIST */
        #friends-panel {
            width: 320px;
            height: 500px;
            top: 100px;
            right: 20px;
        }

        .friend-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            gap: 12px;
            cursor: pointer;
            transition: background 0.15s;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .friend-item:hover {
            background: rgba(102, 192, 244, 0.1);
        }

        .friend-avatar {
            width: 48px;
            height: 48px;
            border-radius: 3px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            position: relative;
        }

        .status-dot {
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid var(--steam-dark);
        }

        .status-online {
            background: #57cbde;
        }

        .status-ingame {
            background: #90ba3c;
        }

        .status-away {
            background: #c89800;
        }

        .status-offline {
            background: #6b7280;
        }

        .friend-info {
            flex: 1;
            min-width: 0;
        }

        .friend-name {
            font-size: 14px;
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .friend-status {
            font-size: 12px;
            color: var(--steam-text-dim);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* CHAT WINDOW */
        #chat-panel {
            width: 400px;
            height: 550px;
            top: 100px;
            right: 360px;
        }

        .chat-messages {
            flex: 1;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chat-bubble {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 13px;
            line-height: 1.4;
        }

        .chat-bubble.self {
            align-self: flex-end;
            background: var(--steam-blue);
            color: white;
        }

        .chat-bubble.other {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.08);
        }

        .chat-input-container {
            padding: 12px 16px;
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 8px;
        }

        .chat-input {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 3px;
            padding: 8px 12px;
            color: var(--steam-text);
            font-size: 13px;
        }

        .chat-input:focus {
            outline: none;
            border-color: var(--steam-blue);
        }

        .chat-send-btn {
            background: var(--steam-blue);
            border: none;
            border-radius: 3px;
            padding: 8px 16px;
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.15s;
        }

        .chat-send-btn:hover {
            background: var(--steam-light-blue);
        }

        /* WEB BROWSER */
        #browser-panel {
            width: 800px;
            height: 600px;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
        }

        .browser-toolbar {
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            gap: 8px;
        }

        .browser-url {
            flex: 1;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 3px;
            padding: 6px 12px;
            color: var(--steam-text);
            font-size: 12px;
        }

        .browser-content {
            width: 100%;
            height: calc(100% - 100px);
            background: white;
        }

        /* NOTES PANEL */
        #notes-panel {
            width: 500px;
            height: 400px;
            top: 150px;
            left: 100px;
        }

        .notes-editor {
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: none;
            padding: 16px;
            color: var(--steam-text);
            font-family: 'Consolas', monospace;
            font-size: 13px;
            resize: none;
        }

        .notes-editor:focus {
            outline: none;
        }

        /* ACHIEVEMENTS */
        #achievements-panel {
            width: 600px;
            height: 500px;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
        }

        .achievement-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 16px;
        }

        .achievement-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 4px;
            padding: 12px;
            display: flex;
            gap: 12px;
            transition: all 0.15s;
        }

        .achievement-card:hover {
            background: rgba(255, 255, 255, 0.06);
            transform: translateY(-2px);
        }

        .achievement-card.unlocked {
            border-color: rgba(144, 186, 60, 0.5);
            background: rgba(144, 186, 60, 0.1);
        }

        .achievement-icon {
            width: 64px;
            height: 64px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
        }

        .achievement-info {
            flex: 1;
        }

        .achievement-name {
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 4px;
        }

        .achievement-desc {
            font-size: 11px;
            color: var(--steam-text-dim);
        }

        /* SCREENSHOTS */
        #screenshots-panel {
            width: 700px;
            height: 500px;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
        }

        .screenshot-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            padding: 16px;
        }

        .screenshot-thumb {
            aspect-ratio: 16/9;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.15s;
        }

        .screenshot-thumb:hover {
            transform: scale(1.05);
        }

        /* FPS COUNTER */
        #fps-counter {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.8);
            padding: 6px 12px;
            border-radius: 3px;
            font-size: 16px;
            font-weight: bold;
            color: #90ba3c;
            pointer-events: all;
            font-family: monospace;
        }

        /* NOTIFICATIONS */
        #notifications {
            position: fixed;
            bottom: 80px;
            right: 20px;
            width: 360px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            pointer-events: all;
        }

        .notification {
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-left: 3px solid var(--steam-blue);
            border-radius: 4px;
            padding: 16px;
            display: flex;
            gap: 12px;
            align-items: center;
            animation: slideInRight 0.3s;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.8);
        }

        @keyframes slideInRight {
            from {
                transform: translateX(400px);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .notification.achievement {
            border-left-color: #90ba3c;
        }

        .notification-icon {
            width: 48px;
            height: 48px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .notification-content {
            flex: 1;
        }

        .notification-title {
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 4px;
        }

        .notification-text {
            font-size: 12px;
            color: var(--steam-text-dim);
        }

        /* SETTINGS PANEL */
        #settings-panel {
            width: 500px;
            height: 550px;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
        }

        .setting-item {
            padding: 16px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .setting-label {
            font-size: 13px;
        }

        .toggle-switch {
            width: 44px;
            height: 24px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            cursor: pointer;
            position: relative;
            transition: background 0.2s;
        }

        .toggle-switch.active {
            background: var(--steam-blue);
        }

        .toggle-knob {
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: left 0.2s;
        }

        .toggle-switch.active .toggle-knob {
            left: 22px;
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* MUSIC PLAYER */
        #music-panel {
            width: 350px;
            height: 150px;
            bottom: 20px;
            right: 20px;
        }

        .music-controls {
            padding: 20px;
            text-align: center;
        }

        .music-track {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .music-buttons {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .music-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            cursor: pointer;
            transition: background 0.15s;
        }

        .music-btn:hover {
            background: var(--steam-blue);
        }

        .volume-slider {
            width: 100%;
        }

        /* RESPONSIVE */
        @media (max-width: 1280px) {
            #overlay-bar {
                flex-wrap: wrap;
            }
        }
    </style>
</head>

<body>
    <div id="overlay-root">
        <!-- Pause Backdrop -->
        <div id="pause-backdrop"></div>

        <!-- FPS Counter -->
        <div id="fps-counter">60 FPS</div>

        <!-- Main Overlay Bar -->
        <div id="overlay-bar">
            <div class="overlay-icon" data-panel="friends">
                <svg viewBox="0 0 24 24">
                    <path

                </svg>
                <span class="icon-badge">2</span>
            </div>

                        d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z" />

                </svg>
            </div>

                <svg viewBox="0 0 24 24">

                </svg>
            </div>
        </div>

        <!-- Friends Panel -->
        <div id="friends-panel" class="panel">
            <div class="panel-header">
                <div class="panel-title">Friends</div>
                <div class="panel-close" onclick="closePanel('friends')">✕</div>
            </div>
            <div class="panel-content">
                <div id="friends-list"></div>
            </div>
        </div>

        <!-- Chat Panel -->
        <div id="chat-panel" class="panel">
            <div class="panel-header">
                <div class="panel-title">Chat</div>
                <div class="panel-close" onclick="closePanel('chat')">✕</div>
            </div>
            <div class="panel-content">
                <div class="chat-messages" id="chat-messages"></div>
                <div class="chat-input-container">
                    <input type="text" class="chat-input" placeholder="Type a message..." id="chat-input">
                    <button class="chat-send-btn" onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>

        <!-- Browser Panel -->
        <div id="browser-panel" class="panel">
            <div class="panel-header">
                <div class="panel-title">Web Browser</div>
                <div class="panel-close" onclick="closePanel('browser')">✕</div>
            </div>
            <div class="browser-toolbar">
                <input type="text" class="browser-url" placeholder="Enter URL..." value="https://google.com">
            </div>
            <div class="panel-content">
                <iframe class="browser-content" src="about:blank"></iframe>
            </div>
        </div>

        <!-- Notes Panel -->
        <div id="notes-panel" class="panel">
            <div class="panel-header">
                <div class="panel-title">Notes</div>
                <div class="panel-close" onclick="closePanel('notes')">✕</div>
            </div>
            <div class="panel-content">
                <textarea class="notes-editor" placeholder="Write your notes here..."></textarea>
            </div>
        </div>

        <!-- Achievements Panel -->
        <div id="achievements-panel" class="panel">
            <div class="panel-header">
                <div class="panel-title">Achievements</div>
                <div class="panel-close" onclick="closePanel('achievements')">✕</div>
            </div>
            <div class="panel-content">
                <div class="achievement-grid" id="achievements-list"></div>
            </div>
        </div>

        <!-- Screenshots Panel -->
        <div id="screenshots-panel" class="panel">
            <div class="panel-header">
                <div class="panel-title">Screenshots</div>
                <div class="panel-close" onclick="closePanel('screenshots')">✕</div>
            </div>
            <div class="panel-content">
                <div class="screenshot-grid" id="screenshots-list"></div>
            </div>
        </div>

        <!-- Music Panel -->
        <div id="music-panel" class="panel">
            <div class="panel-header">
                <div class="panel-title">Music Player</div>
                <div class="panel-close" onclick="closePanel('music')">✕</div>
            </div>
            <div class="panel-content">
                <div class="music-controls">
                    <div class="music-track">King Gizzard - Rattlesnake</div>
                    <div class="music-buttons">
                        <button class="music-btn">⏮</button>
                        <button class="music-btn">⏯</button>
                        <button class="music-btn">⏭</button>
                    </div>
                    <input type="range" class="volume-slider" min="0" max="100" value="70">
                </div>
            </div>
        </div>

        <!-- Settings Panel -->
        <div id="settings-panel" class="panel">
            <div class="panel-header">
                <div class="panel-title">Settings</div>
                <div class="panel-close" onclick="closePanel('settings')">✕</div>
            </div>
            <div class="panel-content">
                <div class="setting-item">
                    <span class="setting-label">Enable Overlay</span>
                    <div class="toggle-switch active">
                        <div class="toggle-knob"></div>
                    </div>
                </div>
                <div class="setting-item">
                    <span class="setting-label">Show FPS Counter</span>
                    <div class="toggle-switch active">
                        <div class="toggle-knob"></div>
                    </div>
                </div>
                <div class="setting-item">
                    <span class="setting-label">Pause Game When Opened</span>
                    <div class="toggle-switch active">
                        <div class="toggle-knob"></div>
                    </div>
                </div>
                <div class="setting-item">
                    <span class="<span class=" setting-label">Enable Notifications</span>
                    <div class="toggle-switch active">
                        <div class="toggle-knob"></div>
                    </div>
                </div>
                <div class="setting-item">
                    <span class="setting-label">Screenshot Sound</span>
                    <div class="toggle-switch active">
                        <div class="toggle-knob"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Notifications Container -->
        <div id="notifications"></div>
    </div>

    <script>
        // ============================================================================
        // STATE MANAGEMENT
        // ============================================================================

        const state = {
            overlayActive: false,
            gamePaused: false,
            activePanel: null,
            fps: 60,
            frameCount: 0,
            lastFrameTime: performance.now(),
            friends: [
                { id: 1, name: 'Robert Fakename', status: 'ingame', game: 'Team Fortress 2', avatar: '#667eea' },
                { id: 2, name: 'Marcia Fakename', status: 'ingame', game: 'CS:GO', avatar: '#764ba2' },
                { id: 3, name: 'xXxSlayerGod420xXx', status: 'ingame', game: 'Cyberpunk 2077', avatar: '#f093fb' },
                { id: 4, name: 'LessShopping', status: 'online', game: null, avatar: '#f5576c' },
                { id: 5, name: 'BaccaratKing', status: 'online', game: null, avatar: '#4facfe' },
                { id: 6, name: 'Bulletz4Breakfast', status: 'online', game: null, avatar: '#00f2fe' },
                { id: 7, name: 'PennywyzeThaKlown', status: 'online', game: null, avatar: '#43e97b' },
                { id: 8, name: 'GamerTag123', status: 'away', game: null, avatar: '#fa709a' },
                { id: 9, name: 'ProPlayer99', status: 'offline', game: null, avatar: '#fee140' },
            ],
            achievements: [
                { id: 1, name: 'Shardbearer Godrick', desc: 'Defeated Shardbearer Godrick', icon: '👑', unlocked: true },
                { id: 2, name: 'First Steps', desc: 'Complete the tutorial', icon: '🎯', unlocked: true },
                { id: 3, name: 'Elden Ring', desc: 'Obtained all achievements', icon: '⭐', unlocked: false },
                { id: 4, name: 'Legendary Armaments', desc: 'Acquired all legendary armaments', icon: '⚔️', unlocked: false },
                { id: 5, name: 'Legendary Ashen Remains', desc: 'Acquired all legendary ashen remains', icon: '👻', unlocked: false },
                { id: 6, name: 'Age of the Stars', desc: 'Achieved the Age of the Stars ending', icon: '✨', unlocked: false },
            ],
            chatMessages: [
                { id: 1, sender: 'Robert Fakename', text: 'Hey', self: false },
                { id: 2, sender: 'You', text: 'Up for a run?', self: true },
                { id: 3, sender: 'Robert Fakename', text: 'Yeah, alright, just one though', self: false },
                { id: 4, sender: 'Robert Fakename', text: "I've gotta go early tomorrow", self: false },
            ]
        };

        // ============================================================================
        // OVERLAY CONTROL
        // ============================================================================

        function toggleOverlay() {
            state.overlayActive = !state.overlayActive;
            const overlayBar = document.getElementById('overlay-bar');
            const backdrop = document.getElementById('pause-backdrop');
            const root = document.getElementById('overlay-root');

            if (state.overlayActive) {
                overlayBar.classList.add('active');
                backdrop.classList.add('active');
                root.classList.add('overlay-active');
                state.gamePaused = true;

                if (window.oracleSteam && window.oracleSteam.pauseGame) {
                    window.oracleSteam.pauseGame();
                }
            } else {
                overlayBar.classList.remove('active');
                backdrop.classList.remove('active');
                root.classList.remove('overlay-active');
                closeAllPanels();
                state.gamePaused = false;

                if (window.oracleSteam && window.oracleSteam.resumeGame) {
                    window.oracleSteam.resumeGame();
                }
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.shiftKey && e.key === 'Tab') {
                e.preventDefault();
                toggleOverlay();
            } else if (e.key === 'Escape' && state.overlayActive) {
                e.preventDefault();
                toggleOverlay();
            }
        });

        function openPanel(panelName) {
            closeAllPanels();
            const panel = document.getElementById(`${panelName}-panel`);
            if (panel) {
                panel.classList.add('active');
                state.activePanel = panelName;

                document.querySelectorAll('.overlay-icon').forEach(icon => {
                    icon.classList.remove('active');
                });
                document.querySelector(`[data-panel="${panelName}"]`)?.classList.add('active');
            }
        }

        function closePanel(panelName) {
            const panel = document.getElementById(`${panelName}-panel`);
            if (panel) {
                panel.classList.remove('active');
                state.activePanel = null;
                document.querySelector(`[data-panel="${panelName}"]`)?.classList.remove('active');
            }
        }

        function closeAllPanels() {
            document.querySelectorAll('.panel').forEach(panel => {
                panel.classList.remove('active');
            });
            document.querySelectorAll('.overlay-icon').forEach(icon => {
                icon.classList.remove('active');
            });
            state.activePanel = null;
        }

        document.querySelectorAll('.overlay-icon').forEach(icon => {
            icon.addEventListener('click', () => {
                const panelName = icon.dataset.panel;
                if (state.activePanel === panelName) {
                    closePanel(panelName);
                } else {
                    openPanel(panelName);
                }
            });
        });

        function makeDraggable(panel) {
            const header = panel.querySelector('.panel-header');
            let isDragging = false;
            let currentX, currentY, initialX, initialY;

            header.addEventListener('mousedown', (e) => {
                if (e.target.closest('.panel-close')) return;

                isDragging = true;
                initialX = e.clientX - panel.offsetLeft;
                initialY = e.clientY - panel.offsetTop;
            });

            document.addEventListener('mousemove', (e) => {
                if (!isDragging) return;

                e.preventDefault();
                currentX = e.clientX - initialX;
                currentY = e.clientY - initialY;

                panel.style.left = currentX + 'px';
                panel.style.top = currentY + 'px';
                panel.style.transform = 'none';
            });

            document.addEventListener('mouseup', () => {
                isDragging = false;
            });
        }

        document.querySelectorAll('.panel').forEach(makeDraggable);

        function updateFPS() {
            state.frameCount++;
            const currentTime = performance.now();
            const elapsed = currentTime - state.lastFrameTime;

            if (elapsed >= 1000) {
                state.fps = Math.round((state.frameCount * 1000) / elapsed);
                document.getElementById('fps-counter').textContent = `${state.fps} FPS`;
                state.frameCount = 0;
                state.lastFrameTime = currentTime;
            }

            requestAnimationFrame(updateFPS);
        }
        updateFPS();

        function renderFriends() {
            const container = document.getElementById('friends-list');
            container.innerHTML = state.friends.map(friend => `
                <div class="friend-item" onclick="openChat(${friend.id})">
                    <div class="friend-avatar" style="background: linear-gradient(135deg, ${friend.avatar}, ${friend.avatar}99)">
                        <div class="status-dot status-${friend.status}"></div>
                    </div>
                    <div class="friend-info">
                        <div class="friend-name">${friend.name}</div>
                        <div class="friend-status">
                            ${friend.status === 'ingame' ? `In-Game: ${friend.game}` :
                    friend.status === 'online' ? 'Online' :
                        friend.status === 'away' ? 'Away' : 'Offline'}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function openChat(friendId) {
            openPanel('chat');
            renderChat();
        }

        function renderChat() {
            const container = document.getElementById('chat-messages');
            container.innerHTML = state.chatMessages.map(msg => `
                <div class="chat-bubble ${msg.self ? 'self' : 'other'}">
                    ${msg.text}
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();

            if (!text) return;

            state.chatMessages.push({
                id: Date.now(),
                sender: 'You',
                text: text,
                self: true
            });

            input.value = '';
            renderChat();

            setTimeout(() => {
                state.chatMessages.push({
                    id: Date.now(),
                    sender: 'Robert Fakename',
                    text: "Soz, Mum needed help with something real quick\nOr,O now",
                    self: false
                });
                renderChat();
            }, 2000);
        }

        document.getElementById('chat-input')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        function renderAchievements() {
            const container = document.getElementById('achievements-list');
            container.innerHTML = state.achievements.map(ach => `
                <div class="achievement-card ${ach.unlocked ? 'unlocked' : ''}">
                    <div class="achievement-icon">${ach.icon}</div>
                    <div class="achievement-info">
                        <div class="achievement-name">${ach.name}</div>
                        <div class="achievement-desc">${ach.desc}</div>
                    </div>
                </div>
            `).join('');
        }

        function showNotification(type, title, text, icon = '🔔') {
            const container = document.getElementById('notifications');
            const id = Date.now();

            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.id = `notification-${id}`;
            notification.innerHTML = `
                <div class="notification-icon">${icon}</div>
                <div class="notification-content">
                    <div class="notification-title">${title}</div>
                    <div class="notification-text">${text}</div>
                </div>
            `;

            container.appendChild(notification);

            if (window.oracleSteam && window.oracleSteam.playSound) {
                window.oracleSteam.playSound('notification');
            }

            setTimeout(() => {
                notification.style.animation = 'slideInRight 0.3s reverse';
                setTimeout(() => notification.remove(), 300);
            }, 5000);
        }

        document.querySelectorAll('.toggle-switch').forEach(toggle => {
            toggle.addEventListener('click', () => {
                toggle.classList.toggle('active');
            });
        });

        document.querySelector('.browser-url')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                let url = e.target.value;
                if (!url.startsWith('http')) url = 'https://' + url;
                document.querySelector('.browser-content').src = url;
            }
        });

        function takeScreenshot() {
            showNotification('default', 'Screenshot Captured', 'Press F12 to view your screenshots', '📷');

            if (window.oracleSteam && window.oracleSteam.captureScreen) {
                window.oracleSteam.captureScreen();
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'F12') {
                e.preventDefault();
                takeScreenshot();
            }
        });

        function init() {
            renderFriends();
            renderChat();
            renderAchievements();

            console.log('[Oracle Steam] Overlay initialized');
            console.log('[Oracle Steam] Press Shift+Tab to toggle overlay');

            setTimeout(() => {
                showNotification('achievement', 'Achievement Unlocked!', 'Shardbearer Godrick - Defeated Shardbearer Godrick', '👑');
            }, 5000);

            setTimeout(() => {
                showNotification('default', 'Friend Online', 'Robert Fakename is now playing Team Fortress 2', '👤');
            }, 8000);

            window.oracleSteam = {
                pauseGame: () => console.log('[Oracle Steam] Game paused'),
                resumeGame: () => console.log('[Oracle Steam] Game resumed'),
                playSound: (sound) => console.log(`[Oracle Steam] Playing sound: ${sound}`),
                captureScreen: () => console.log('[Oracle Steam] Screenshot captured'),
                unlockAchievement: (id) => {
                    const ach = state.achievements.find(a => a.id === id);
                    if (ach && !ach.unlocked) {
                        ach.unlocked = true;
                        renderAchievements();
                        showNotification('achievement', 'Achievement Unlocked!', `${ach.name} - ${ach.desc}`, ach.icon);
                    }
                }
            };

            if (window.chrome && window.chrome.webview) {
                window.chrome.webview.postMessage({ type: 'overlay_ready' });
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>

</html>
